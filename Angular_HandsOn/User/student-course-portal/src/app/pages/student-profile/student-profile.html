<div class="profile-container">
  <h2>Student Profile</h2>

  <h3 style="margin-bottom: 1rem; color: var(--text-secondary);">Your Enrolled Courses</h3>
  
  <ng-container *ngIf="enrolledCourses$ | async as enrolledCourses">
    <ul class="course-list">
      <li class="course-item" *ngFor="let course of enrolledCourses">
        <span style="font-weight: 600;">{{ course.name }}</span>
        <span style="color: var(--accent-primary); font-family: monospace; background: rgba(59, 130, 246, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px;">{{ course.code }}</span>
      </li>
      <li class="empty-state" *ngIf="enrolledCourses.length === 0">
        You haven't enrolled in any courses yet.
        <br><br>
        <button routerLink="/courses" style="font-size: 0.9rem;">Browse Courses</button>
      </li>
    </ul>
  </ng-container>
</div>
