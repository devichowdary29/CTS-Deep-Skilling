<h2 style="text-align: center; margin-bottom: 2rem;">Enrollment Request Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
  <div class="form-group">
    <label>Student Name:</label>
    <input name="studentName" [(ngModel)]="studentName" required minlength="3" #nameCtrl="ngModel" placeholder="Enter your full name">
    <span class="error-msg" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required.</span>
    <span class="error-msg" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters.</span>
  </div>

  <div class="form-group">
    <label>Email Address:</label>
    <input type="email" name="studentEmail" [(ngModel)]="studentEmail" required email #emailCtrl="ngModel" placeholder="you@example.com">
    <span class="error-msg" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required.</span>
    <span class="error-msg" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Invalid email format.</span>
  </div>

  <div class="form-group">
    <label>Course ID:</label>
    <input type="number" name="courseId" [(ngModel)]="courseId" required #courseCtrl="ngModel" placeholder="e.g. 101">
    <span class="error-msg" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required.</span>
  </div>

  <div class="form-group">
    <label>Preferred Semester:</label>
    <select name="preferredSemester" [(ngModel)]="preferredSemester">
      <option value="Odd">Odd Semester</option>
      <option value="Even">Even Semester</option>
    </select>
  </div>

  <div class="form-group">
    <label class="checkbox-label">
      <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" required>
      I agree to the terms and conditions
    </label>
  </div>

  <button type="submit" [disabled]="enrollForm.invalid">Submit Enrollment</button>
  <button type="button" (click)="enrollForm.resetForm()" style="background-color: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary); margin-top: 1rem;">Reset Form</button>
</form>

<div *ngIf="submitted" class="success-msg">
  Enrollment request submitted successfully! We'll be in touch soon.
</div>
