<div class="hero">
  <h2>Welcome to the Student Course Portal</h2>
  <p>Your one-stop destination for tracking, managing, and exploring new courses. Enhance your learning journey with our modern platform.</p>
  
  <button class="cta-button" (click)="toggleEnrollMessage()">Explore Now</button>
  
  <div *ngIf="showEnrollMessage" class="enroll-message">
    Get started by checking out our latest courses!
  </div>

  <div class="stats">
    <div class="stat-item">
      <h3>{{ courseCount }}</h3>
      <p>Available Courses</p>
    </div>
    <div class="stat-item">
      <h3>{{ studentName }}</h3>
      <p>Active Student</p>
    </div>
  </div>
</div>
