<div class="course-card" 
     [ngClass]="cardClasses" 
     [ngStyle]="{ 'border-left-color': getBorderColor(), 'border-left-style': 'solid', 'border-left-width': '4px' }"
     appHighlight="lightblue">
     
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>{{ course.credits | creditLabel }}</p>
  
  <div [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge-passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge-failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge-pending">Pending</span>
    <span *ngSwitchDefault class="badge-none">No Grade</span>
  </div>

  <div class="actions">
    <button (click)="$event.stopPropagation(); enrollRequested.emit(course.id)">
      {{ course.isEnrolled ? 'Unenroll' : 'Enroll' }}
    </button>
    <button (click)="$event.stopPropagation(); toggleExpanded()">Show Details</button>
  </div>

  <div *ngIf="isExpanded" class="details">
    <p>Additional details about {{ course.name }} would go here.</p>
  </div>
</div>
